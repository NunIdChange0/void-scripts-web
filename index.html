<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID KERNEL | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        nav { padding: 20px 40px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; letter-spacing: 5px; color: var(--primary); font-weight: bold; }
        
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 4rem; letter-spacing: 15px; margin: 0; }
        
        .auth-panel { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 30px; width: 320px; border-radius: 8px; box-shadow: 0 0 30px rgba(0,255,65,0.05); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #222; color: var(--primary); box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; }
        .msg { font-size: 0.8rem; margin-top: 15px; color: #555; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VOID_KERNEL</div>
        <div style="color: #444; font-size: 0.8rem;">STATUS: <span id="db-status">CONNECTING...</span></div>
    </nav>

    <div class="hero">
        <div class="auth-panel">
            <h2 style="margin-top:0; font-size: 1rem; color: var(--primary);">SYSTEM_ACCESS</h2>
            <input type="email" id="email" placeholder="EMAIL_ADDRESS">
            <input type="password" id="password" placeholder="ACCESS_KEY">
            <button onclick="handleLogin()">LOGIN</button>
            <button onclick="handleRegister()" style="margin-top:10px; background:transparent; color:#fff; border:1px solid #333;">REGISTER</button>
            <div id="status-msg" class="msg">>_ Awaiting input...</div>
        </div>
    </div>

    <script>
        // BURAYA SUPABASE BİLGİLERİNİ GİR
        const SUPABASE_URL = 'https://nwgmvlnuycmuyxycjxzv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_mPV8uPYOjolgkWLSikguEA_i6xyDcSn';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Bağlantı Kontrolü
        if(supabase) { document.getElementById('db-status').innerText = 'ONLINE'; document.getElementById('db-status').style.color = '#00ff41'; }

        async function handleRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) { document.getElementById('status-msg').innerText = "ERROR: " + error.message; }
            else { document.getElementById('status-msg').innerText = "SUCCESS: Check your email for confirmation!"; }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) { document.getElementById('status-msg').innerText = "ERROR: " + error.message; }
            else { document.getElementById('status-msg').innerText = "WELCOME, " + data.user.email; }
        }
    </script>
</body>
</html>
