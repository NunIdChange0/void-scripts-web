<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Scripts | Yazılım Ağacı</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid #333;
            padding: 50px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        p {
            color: #888;
            font-size: 1.2rem;
        }
        .status {
            margin-top: 20px;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #1a1a1a;
            border: 1px solid #444;
            font-size: 0.9rem;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VOID SCRIPTS</h1>
        <p>Yazılım ağacı yakında kök salacak.</p>
        <div class="status">● Sistem Çevrimiçi</div>
    </div>
</body>
</html>
