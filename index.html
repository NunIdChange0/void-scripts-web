<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Scripts</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --panel-bg: #050505;
            --text: #924aa8;
            --text-dim: #666666;
            --border: #1a1a1a;
            --void-purple: #a020f0;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .logo { position: absolute; top: 30px; left: 40px; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; }

        /* Panel */
        .panel { background: var(--panel-bg); border: 1px solid var(--border); width: 380px; padding: 40px; border-radius: 4px; }

        /* Mor Onay Bildirimi */
        #notification-banner {
            display: none;
            background: rgba(160, 32, 240, 0.15);
            border: 1px solid var(--void-purple);
            color: #fff;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            text-align: center;
            font-weight: 700;
            border-radius: 2px;
        }

        h2 { font-weight: 900; font-size: 1.4rem; margin-bottom: 30px; text-align: left; border-bottom: 2px solid #fff; display: inline-block; padding-bottom: 5px; }
        
        input {
            width: 100%; padding: 15px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid var(--border);
            color: var(--text); font-family: var(--font-main); font-size: 0.9rem; outline: none; transition: 0.2s;
        }
        input:focus { border-color: #444; }

        button {
            width: 100%; padding: 15px; font-family: var(--font-main); font-weight: 700; border: none;
            cursor: pointer; margin-top: 5px; transition: 0.2s; font-size: 0.9rem; border-radius: 2px;
        }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #ddd; }
        .btn-secondary { background: transparent; color: var(--text-dim); margin-top: 15px; font-size: 0.8rem; }
        .btn-secondary:hover { color: #fff; }
        
        #status-msg { margin-top: 20px; font-size: 0.75rem; color: #444; text-align: center; }

        /* Script Kısmı */
        #script-panel { display: none; width: 90%; max-width: 1000px; }
        .script-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .script-card { background: #080808; border: 1px solid var(--border); padding: 25px; }
        .script-card h3 { margin-bottom: 10px; font-size: 1rem; color: var(--void-purple); }
        .script-card p { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
        .script-card button { width: auto; padding: 8px 20px; font-size: 0.75rem; background: #111; color: #fff; border: 1px solid #222; }
        .script-card button:hover { background: #fff; color: #000; }
        
        .logout-btn { margin-top: 40px; background: transparent; color: #ff3333; border: 1px solid #330000; width: auto; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="logo">VOID SCRIPTS</div>

    <div class="main-container">
        <div class="panel auth-panel" id="auth-panel">
            <div id="notification-banner"></div>

            <h2>Giriş Yap</h2>
            <input type="text" id="nickname" placeholder="Nickname">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="handleLogin()">Enter</button>
            <button class="btn-secondary" onclick="handleRegister()">Create an account</button>
        </div>

        <div id="script-panel">
            <h1 style="font-size: 2rem; font-weight: 900;">Script Arşivi</h1>
            <p id="welcome-msg" style="color: #666; margin-top: 5px;"></p>
            <div class="script-grid">
                <div class="script-card">
                    <h3>Hızlı Koşma (Speed)</h3>
                    <p>Karakterin hızını arttıran basit bir Lua scripti.</p>
                    <button onclick="copyScript('print(\'Hız aktif\')')">Kodu Kopyala</button>
                </div>
                <div class="script-card">
                    <h3>Görünmezlik (Ghost)</h3>
                    <p>Diğer oyuncuların seni görmesini engeller.</p>
                    <button onclick="copyScript('print(\'Görünmezlik aktif\')')">Kodu Kopyala</button>
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Oturumu Kapat</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nwgmvlnuycmuyxycjxzv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53Z212bG51eWNtdXl4eWNqeHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzY2MzcsImV4cCI6MjA4OTExMjYzN30.Ewdar4Gzw870VXofPj95tg_kKCizzS2gH3patBoZn_I'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.addEventListener('load', () => {
            const hash = window.location.hash;
            if (hash && (hash.includes("access_token") || hash.includes("type=signup"))) {
                const banner = document.getElementById('notification-banner');
                banner.innerText = "HESABIN ONAYLANDI! GİRİŞ YAPABİLİRSİN.";
                banner.style.display = "block";
                setTimeout(() => { history.replaceState(null, null, window.location.pathname); }, 4000);
            }
        });

        async function handleRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nick = document.getElementById('nickname').value;
            const status = document.getElementById('status-msg');

            if(!email || !password || !nick) { status.innerText = "Hata: Boş yer bırakma!"; return; }

            const { error } = await _supabase.auth.signUp({
                email, password, options: { data: { nickname: nick } }
            });
            
            if (error) { status.innerText = "Hata: " + error.message; }
            else { status.innerText = "Onay maili gönderildi, kontrol et!"; }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (error) { document.getElementById('status-msg').innerText = "Hata: " + error.message; }
            else {
                const nick = data.user.user_metadata.nickname || "User";
                document.getElementById('auth-panel').style.display = 'none';
                document.getElementById('script-panel').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Selam, " + nick + ". Scriptler aşağıda.";
            }
        }

        async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }
        function copyScript(code) { navigator.clipboard.writeText(code); alert("Kopyalandı!"); }
    </script>
</body>
</html>
