<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Scripts | Yazılım Ağacı</title>
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --accent: #ffffff; --text: #888; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Navigasyon */
        nav { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        nav a { color: var(--text); text-decoration: none; margin: 0 15px; transition: 0.3s; }
        nav a:hover { color: #fff; }

        /* Hero Bölümü */
        .hero { text-align: center; padding: 80px 20px; }
        .hero h1 { font-size: 3.5rem; letter-spacing: 8px; margin: 0; }
        .hero p { color: var(--text); margin-top: 10px; }

        /* Script Kartları Konteynırı */
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 40px; }

        /* Script Kartı Tasarımı */
        .card { 
            background: var(--card); 
            border: 1px solid #222; 
            padding: 25px; 
            border-radius: 12px; 
            width: 320px; 
            transition: 0.3s;
        }
        .card:hover { border-color: #444; transform: translateY(-5px); }
        .card h3 { margin-top: 0; font-size: 1.4rem; }
        .card p { color: var(--text); font-size: 0.9rem; line-height: 1.6; }

        /* Kopyala Butonu */
        .copy-btn {
            background: #fff; color: #000; border: none; width: 100%;
            padding: 12px; border-radius: 8px; font-weight: bold;
            cursor: pointer; margin-top: 15px; transition: 0.2s;
        }
        .copy-btn:hover { background: #ccc; }
        .copy-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <nav>
        <a href="#">ANASAYFA</a>
        <a href="#">SCRIPTLER</a>
        <a href="https://github.com/NunIdChange0" target="_blank">GITHUB</a>
    </nav>

    <div class="hero">
        <h1>VOID SCRIPTS</h1>
        <p>Yazılım ağacının ilk dalları burada şekilleniyor.</p>
