<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID | Premium Script Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(5, 5, 5, 0.8);
            --accent: #a020f0;
            --success: #00ff88;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: #111111;
            --shadow: rgba(160, 32, 240, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        #canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        }

        .navbar { padding: 30px 60px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 5px; color: #fff; text-decoration: none; text-shadow: 0 0 10px var(--accent); }
        .logo span { color: var(--accent); }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; }

        .auth-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 40px; width: 400px; border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(160, 32, 240, 0.3);
        }

        h2 { font-size: 1.6rem; margin-bottom: 25px; font-weight: 800; letter-spacing: 1px; }
        .btn-main {
            width: 100%; padding: 14px; background: var(--accent); color: #fff;
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
            margin-top: 10px; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 30px var(--accent); background: #b030ff; }

        input {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border);
            border-radius: 8px; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; margin-bottom: 15px;
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 20px var(--shadow); }

        /* Status Indicator */
        .system-status {
            position: fixed; bottom: 30px; left: 40px; display: flex; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim);
            letter-spacing: 1px; z-index: 100;
        }
        .status-dot {
            width: 8px; height: 8px; background-color: var(--success); border-radius: 50%;
            margin-right: 12px; box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        /* Main Panel */
        #main-panel { display: none; padding: 0 60px 60px 60px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 40px; }
        .s-card {
            background: var(--card-bg); border: 1px solid var(--border); padding: 30px;
            border-radius: 12px; position: relative; backdrop-filter: blur(10px);
        }

        footer {
            padding: 40px 60px; text-align: center; position: relative; z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        .credits {
            font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-dim);
            letter-spacing: 2px; text-transform: uppercase;
        }
        .credits span { color: var(--accent); font-weight: bold; text-shadow: 0 0 5px var(--accent); }

        .switch-auth { margin-top: 20px; text-align: center; color: var(--text-dim); font-size: 0.85rem; }
        .switch-auth b { color: var(--accent); cursor: pointer; }
        .status-msg { margin-top: 15px; font-size: 0.8rem; text-align: center; min-height: 1.2rem; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="system-status">
        <div class="status-dot"></div>
        SYSTEM OPERATIONAL
    </div>

    <nav class="navbar">
        <a href="/" class="logo">VOID<span>.</span></a>
        <div id="user-nav" style="display: none;">
            <span id="nav-nick" style="margin-right: 20px; color: var(--accent); font-weight: bold;"></span>
            <b onclick="location.reload()" style="color: #ff4444; cursor: pointer; font-size: 0.9rem;">LOGOUT</b>
        </div>
    </nav>

    <div class="container" id="auth-container">
        <div class="auth-card" id="login-form">
            <h2>LOGIN<span>.</span></h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn-main" onclick="handleAuth('login')">Initialize</button>
            <div class="switch-auth">New here? <b onclick="toggleAuth()">Create Access</b></div>
            <div id="login-status" class="status-msg"></div>
        </div>

        <div class="auth-card" id="register-form" style="display: none;">
            <h2>REGISTER<span>.</span></h2>
            <input type="text" id="reg-nick" placeholder="Nickname">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="btn-main" onclick="handleAuth('register')">Establish Identity</button>
            <div class="switch-auth">Recognized user? <b onclick="toggleAuth()">Sign In</b></div>
            <div id="reg-status" class="status-msg"></div>
        </div>
    </div>

    <div id="main-panel">
        <h1 style="font-size: 2.5rem; font-weight: 800;">VAULT <span style="color: var(--accent)">SYSTEM</span></h1>
        <div class="grid">
            <div class="s-card">
                <h3 style="color: var(--accent);">Universal Aimbot</h3>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin: 15px 0;">Advanced bone tracking algorithms. Zero latency.</p>
                <button class="btn-main" style="padding: 10px;" onclick="copy('loadstring(game:HttpGet(\'https://api.voidscripts.org/aimbot\'))()')">GET SCRIPT</button>
            </div>
            <div class="s-card">
                <h3 style="color: var(--accent);">Global Visuals</h3>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin: 15px 0;">Full ESP suite with box, skeleton and tracer support.</p>
                <button class="btn-main" style="padding: 10px;" onclick="copy('loadstring(game:HttpGet(\'https://api.voidscripts.org/esp\'))()')">GET SCRIPT</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="credits">MADE BY <span>ERENVEIN</span> & <span>NUNIDCHANGE</span></div>
    </footer>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * (innerWidth - size * 2) + size * 2);
                let y = (Math.random() * (innerHeight - size * 2) + size * 2);
                let dx = (Math.random() * 1) - 0.5;
                let dy = (Math.random() * 1) - 0.5;
                particles.push({x, y, dx, dy, size});
            }
        }
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            particles.forEach(p => {
                if (p.x > canvas.width || p.x < 0) p.dx = -p.dx;
                if (p.y > canvas.height || p.y < 0) p.dy = -p.dy;
                p.x += p.dx; p.y += p.dy;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = '#a020f0'; ctx.fill();
            });
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let distance = ((particles[a].x - particles[b].x) ** 2) + ((particles[a].y - particles[b].y) ** 2);
                    if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                        ctx.strokeStyle = `rgba(160, 32, 240, ${1 - distance / 20000})`;
                        ctx.lineWidth = 1; ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y); ctx.stroke();
                    }
                }
            }
        }
        init(); animate(); window.addEventListener('resize', init);

        function toggleAuth() {
            const login = document.getElementById('login-form');
            const reg = document.getElementById('register-form');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            reg.style.display = reg.style.display === 'none' ? 'block' : 'none';
        }
        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("ACCESS GRANTED: Script Copied.");
        }
        async function handleAuth(type) {
            const statusDiv = document.getElementById(type === 'login' ? 'login-status' : 'reg-status');
            statusDiv.innerText = "Connecting to Secure Server...";
            if(type === 'login') {
                setTimeout(() => {
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('main-panel').style.display = 'block';
                    document.getElementById('user-nav').style.display = 'block';
                    document.getElementById('nav-nick').innerText = "SYSTEM_USER";
                }, 1000);
            } else {
                setTimeout(() => {
                    statusDiv.style.color = "var(--accent)";
                    statusDiv.innerText = "Identity established.";
                }, 1000);
            }
        }
    </script>
</body>
</html>
