<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SCRIPTS | Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --panel-bg: #050505;
            --text: #ffffff;
            --text-dim: #444444;
            --border: #111111;
            --void-purple: #a020f0; /* Elit VOID Moru */
            --font-main: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header { padding: 40px; display: flex; justify-content: space-between; align-items: center; position: absolute; width: 100%; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; border-left: 3px solid #fff; padding-left: 15px; }
        .status { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        .main-container { flex: 1; display: flex; justify-content: center; align-items: center; }

        /* Panel Ayarları */
        .panel { background: var(--panel-bg); border: 1px solid var(--border); width: 420px; position: relative; padding: 60px 40px; }
        .panel::after { content: ''; position: absolute; top: -1px; left: -1px; width: 40px; height: 40px; border-top: 2px solid #fff; border-left: 2px solid #fff; }

        /* Bildirim Alanı (Özellikle Mor Onay İçin) */
        #notification-banner {
            display: none; /* Varsayılan gizli */
            background: rgba(160, 32, 240, 0.1);
            border: 1px solid var(--void-purple);
            color: var(--void-purple);
            padding: 15px;
            margin-bottom: 30px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .auth-panel h2 { font-weight: 900; font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 2px; text-align: center; }
        
        input {
            width: 100%; padding: 20px; margin-bottom: 15px; background: transparent; border: 1px solid var(--border);
            color: var(--text); font-family: var(--font-main); font-size: 0.85rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #333; background: #080808; }

        button {
            width: 100%; padding: 20px; font-family: var(--font-main); font-weight: 900; border: none;
            cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem;
        }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #ccc; }
        .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 20px; }
        .btn-secondary:hover { color: #fff; border-color: #444; }
        
        #status-msg { margin-top: 25px; font-family: var(--font-mono); font-size: 0.65rem; color: #444; text-align: center; line-height: 1.6; text-transform: uppercase; }

        #script-panel { display: none; width: 90%; max-width: 1100px; padding: 40px; }
        .script-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 50px; }
        .script-card { background: #030303; border: 1px solid var(--border); padding: 35px; transition: 0.3s; }
        .script-card:hover { border-color: #222; }
        
        .logout-btn { margin-top: 60px; background: transparent; color: #ff0000; border: 1px solid #200000; width: auto; padding: 10px 20px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">VOID</div>
        <div class="status">SYS_LINK: <span id="db-status" style="color: #222;">OFFLINE</span></div>
    </header>

    <div class="main-container">
        <div class="panel auth-panel" id="auth-panel">
            <div id="notification-banner"></div>

            <h2>ACCESS_PROTOCOL</h2>
            <input type="text" id="nickname" placeholder="NICKNAME">
            <input type="email" id="email" placeholder="EMAIL_ADDRESS">
            <input type="password" id="password" placeholder="ACCESS_KEY">
            <button class="btn-primary" onclick="handleLogin()">ENTER_VOID</button>
            <button class="btn-secondary" onclick="handleRegister()">CREATE_IDENTITY</button>
            <div id="status-msg">AWAITING_INPUT...</div>
        </div>

        <div id="script-panel">
            <h1 style="font-size: 2.5rem; font-weight: 900; letter-spacing: -1px;">VOID_VAULT</h1>
            <p id="welcome-msg" style="color: var(--text-dim); margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;"></p>
            <div class="script-grid">
                <div class="script-card">
                    <h3>INTERNAL_SPEED.lua</h3>
                    <button onclick="copyScript('print(\'Void Speed\')')">COPY_CODE</button>
                </div>
                <div class="script-card">
                    <h3>GHOST_MODE.lua</h3>
                    <button onclick="copyScript('print(\'Void Ghost\')')">COPY_CODE</button>
                </div>
            </div>
            <button class="logout-btn" onclick="handleLogout()">TERMINATE_SESSION</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nwgmvlnuycmuyxycjxzv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53Z212bG51eWNtdXl4eWNqeHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzY2MzcsImV4cCI6MjA4OTExMjYzN30.Ewdar4Gzw870VXofPj95tg_kKCizzS2gH3patBoZn_I'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.addEventListener('load', () => {
            const hash = window.location.hash;
            // Onay linkinden dönüşü yakala
            if (hash && (hash.includes("access_token") || hash.includes("type=signup"))) {
                const banner = document.getElementById('notification-banner');
                banner.innerText = "SUCCESS: ACCOUNT_VERIFIED. PROCEED_TO_LOGIN.";
                banner.style.display = "block"; // Mor kutuyu göster
                
                setTimeout(() => { history.replaceState(null, null, window.location.pathname); }, 3000);
            }
            if(_supabase) {
                document.getElementById('db-status').innerText = 'SECURE';
                document.getElementById('db-status').style.color = '#fff';
            }
        });

        async function handleRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nick = document.getElementById('nickname').value;
            const statusMsg = document.getElementById('status-msg');

            if(!email || !password || !nick) { statusMsg.innerText = "ERR: EMPTY_FIELDS"; return; }

            const { error } = await _supabase.auth.signUp({
                email, password, options: { data: { nickname: nick } }
            });
            
            if (error) { statusMsg.innerText = "ERR: " + error.message; statusMsg.style.color = "#ff0000"; }
            else { statusMsg.innerText = "SENT: CHECK_YOUR_MAIL_FOR_LINK."; statusMsg.style.color = "#fff"; }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (error) { document.getElementById('status-msg').innerText = "ERR: " + error.message; }
            else {
                const nick = data.user.user_metadata.nickname || "User";
                document.getElementById('auth-panel').style.display = 'none';
                document.getElementById('script-panel').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "AUTHORIZED: " + nick;
                document.getElementById('db-status').innerText = "AUTH: " + nick;
            }
        }

        async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }
        function copyScript(code) { navigator.clipboard.writeText(code); alert("Copied!"); }
    </script>
</body>
</html>
