<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Kernel | Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #00ff41; /* Matrix Yeşili */
            --bg: #050505;
            --surface: #0f0f0f;
            --border: #1a1a1a;
            --text: #888;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Fira Code', 'Courier New', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navigasyon */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
        }

        .logo span { color: var(--primary); }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary); }

        /* Ana Bölüm */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #00ff4105 0%, transparent 70%);
        }

        .hero h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
        }
